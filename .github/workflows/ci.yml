name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e ".[dev,operator]"
      - name: Test
        run: pytest tests/ -v
      - name: Coverage
        run: pytest --cov=pentnote --cov-fail-under=80
      - name: Ruff
        run: ruff check pentnote tests
      - name: Black
        run: black --check pentnote tests
      - name: Mypy
        run: mypy pentnote --ignore-missing-imports
